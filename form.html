<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<form
			class="form"
			data-form="form-contact"
			action
			data-js-form='{"url":"https://jsonplaceholder.typicode.com/todos/","method":"GET"}'
		>
			<div class="form-row">
				<p class="form-title">SEND US MESSAGE</p>
			</div>
			<div class="form-col">
				<div class="form-row">
					<div class="form-col">
						<label class="form-label" for="name">Name</label>
						<input
							class="form-input"
							placeholder="Your Name"
							type="text"
							name="name"
							id="form-input-name"
						/>
						<span
							class="validate validate-name"
							data-form="form-input-name"
						></span>
					</div>
				</div>

				<div class="form-row">
					<div class="form-col">
						<label class="form-label" for="email">Email</label>
						<input
							class="form-input"
							placeholder="Your Email"
							type="email"
							name="email"
							id="form-input-email"
						/>
						<span
							class="validate validate-email"
							data-form="form-input-email"
						></span>
					</div>
				</div>

				<div class="form-row">
					<div class="form-col">
						<label class="form-label" for="message">Message</label>
						<textarea
							class="form-textarea"
							placeholder="Your Message"
							name="message"
							id="form-textarea"
						></textarea>
						<span
							class="validate validate-text-area"
							data-form="form-textarea"
						></span>
					</div>
				</div>

				<input
					type="submit"
					class="form-submit"
					value="SUBMIT"
					data-form="form-contact"
					id="form-submit"
				/>
				<span
					class="validate"
					data-form="form-submit"
				></span>
			</div>
		</form>
	</body>
	<script type="module" src="main.js"></script>
	<script src="form.js"></script>
</html>
